<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GRH Devis">
<meta name="theme-color" content="#C9A84C">
<link rel="manifest" href="manifest.json">
<title>GRH Devis</title>

<style>
:root {
  --gold: #C9A84C;
  --gold-l: #E8C96A;
  --gold-d: #8B6914;
  --green: #4A7C59;
  --green-l: #6BAF7A;
  --black: #0A0A0A;
  --dark: #111;
  --dark2: #1A1A1A;
  --dark3: #222;
  --text: #E8E0D0;
  --muted: #88887A;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--black);
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  font-size: 15px;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.app-header {
  background: var(--dark);
  border-bottom: 1px solid rgba(201,168,76,.2);
  padding: calc(var(--safe-top) + 14px) 18px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  z-index: 50;
}

.logo-svg { width: 36px; height: 36px; flex-shrink: 0; }

.logo-words { line-height: 1.1; }
.logo-words .m { font-size: 15px; font-weight: 700; color: var(--gold); letter-spacing: 2.5px; }
.logo-words .s { font-size: 8px; color: var(--muted); letter-spacing: 4px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  background: var(--dark);
  border-top: 1px solid rgba(201,168,76,.15);
  display: flex;
  padding-bottom: var(--safe-bot);
  flex-shrink: 0;
  z-index: 50;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 0;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 10px;
  letter-spacing: .5px;
  cursor: pointer;
  transition: color .2s;
}

.nav-btn .icon { font-size: 22px; }
.nav-btn.active { color: var(--gold); }
.nav-btn.active .icon { filter: drop-shadow(0 0 6px rgba(201,168,76,.4)); }

/* ── SCREENS ── */
.screen { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 16px; }
.screen.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,.12);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 14px;
}

.card-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(201,168,76,.15);
}

/* ── FIELDS ── */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }

input, select, textarea {
  width: 100%;
  background: var(--dark3);
  border: 1px solid rgba(201,168,76,.15);
  border-radius: 10px;
  padding: 11px 13px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  -webkit-appearance: none;
}

input:focus, select:focus, textarea:focus { border-color: var(--gold); }
select option { background: var(--dark3); }
textarea { resize: none; min-height: 65px; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* ── SURF INFO ── */
.surf-info {
  background: rgba(74,124,89,.1);
  border: 1px solid rgba(74,124,89,.25);
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 12px;
  color: var(--green-l);
  line-height: 1.7;
  margin-top: 8px;
}

/* ── PRESTATIONS ── */
.prest-item {
  background: var(--dark3);
  border: 1px solid rgba(201,168,76,.1);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
}

.prest-row1 { margin-bottom: 8px; }
.prest-row2 { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; }
.prest-row2 input { padding: 9px 10px; font-size: 14px; }

.btn-rm {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid rgba(255,80,80,.3);
  background: rgba(255,80,80,.08);
  color: #ff6060;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.btn-add-prest {
  width: 100%;
  background: none;
  border: 1px dashed rgba(201,168,76,.3);
  border-radius: 10px;
  padding: 12px;
  color: var(--gold);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
  cursor: pointer;
  margin-top: 4px;
}

/* ── BUTTONS ── */
.btn-gold {
  background: linear-gradient(135deg, var(--gold-d), var(--gold), var(--gold-l));
  color: var(--black);
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  width: 100%;
  box-shadow: 0 4px 18px rgba(201,168,76,.25);
}

.btn-outline {
  background: none;
  border: 1px solid rgba(201,168,76,.3);
  color: var(--gold);
  border-radius: 12px;
  padding: 13px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
  cursor: pointer;
  width: 100%;
}

.btn-green {
  background: linear-gradient(135deg, var(--green), var(--green-l));
  color: white;
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  cursor: pointer;
  width: 100%;
}

.btn-wa {
  background: #25D366;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

.btn-mail {
  background: #3478F6;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

.gap12 { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }

/* ── CLIENT LIST ── */
.client-card {
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,.12);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}

.client-card:active { background: var(--dark3); }
.client-name { font-size: 15px; font-weight: 500; color: var(--text); }
.client-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.client-actions { display: flex; gap: 8px; }

.btn-sm {
  padding: 7px 13px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

.btn-sm-gold { background: var(--gold); color: var(--black); }
.btn-sm-red { background: rgba(255,80,80,.15); color: #ff6060; border: 1px solid rgba(255,80,80,.3); }

/* ── HISTORIQUE ── */
.hist-card {
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,.12);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
}

.hist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.hist-ref { font-size: 13px; font-weight: 600; color: var(--gold); }
.hist-total { font-size: 16px; font-weight: 700; color: var(--text); }
.hist-client { font-size: 14px; color: var(--text); margin-bottom: 2px; }
.hist-date { font-size: 12px; color: var(--muted); }
.hist-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--dark2);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(var(--safe-bot) + 24px);
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  border-top: 2px solid rgba(201,168,76,.3);
}

.modal-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 18px;
  text-align: center;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(var(--safe-bot) + 80px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green);
  color: white;
  padding: 11px 22px;
  border-radius: 25px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: all .3s;
  z-index: 300;
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}
.empty .ei { font-size: 48px; margin-bottom: 12px; }
.empty .et { font-size: 15px; }

/* ── PAGE TITLE ── */
.page-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

.section-spacer { height: 80px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <svg class="logo-svg" viewBox="0 0 36 36" fill="none">
    <path d="M18 3L33 15V33H3V15Z" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <path d="M12 33V22H24V33" stroke="#4A7C59" stroke-width="1.5" fill="none"/>
    <rect x="15" y="11" width="6" height="6" stroke="#C9A84C" stroke-width="1" fill="none"/>
  </svg>
  <div class="logo-words">
    <div class="m">GLOBAL RENOV</div>
    <div class="s">HABITAT</div>
  </div>
</header>

<!-- SCREENS -->

<!-- ① NOUVEAU DEVIS -->
<div class="screen active" id="screen-devis">
  <div class="page-title">Nouveau devis</div>
  <div class="page-sub">Remplis les champs — le calcul est automatique</div>

  <!-- Client -->
  <div class="card">
    <div class="card-title">Client</div>
    <div class="field">
      <label>Nom du client</label>
      <input id="c-nom" type="text" placeholder="M. Dupont" autocomplete="off">
    </div>
    <div class="row2">
      <div class="field">
        <label>Téléphone</label>
        <input id="c-tel" type="tel" placeholder="06 12 34 56 78">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="c-email" type="email" placeholder="client@mail.com">
      </div>
    </div>
    <div class="field">
      <label>Adresse chantier</label>
      <input id="c-adr" type="text" placeholder="12 rue des Lilas, Lorient">
    </div>
    <div class="row2">
      <div class="field">
        <label>Réf. devis</label>
        <input id="d-ref" type="text" placeholder="GRH-001">
      </div>
      <div class="field">
        <label>Date</label>
        <input id="d-date" type="date">
      </div>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="d-notes" placeholder="Description des travaux..."></textarea>
    </div>
    <!-- Sauvegarder client -->
    <button class="btn-outline" style="margin-top:4px" onclick="saveClient()">💾 Sauvegarder ce client</button>
  </div>

  <!-- Surfaces -->
  <div class="card">
    <div class="card-title">Surfaces</div>
    <div class="row3">
      <div class="field">
        <label>Sol (m²)</label>
        <input id="s-sol" type="number" placeholder="25" inputmode="decimal" oninput="calcSurfaces()">
      </div>
      <div class="field">
        <label>Hauteur (m)</label>
        <input id="s-haut" type="number" placeholder="2.5" step="0.1" inputmode="decimal" oninput="calcSurfaces()">
      </div>
      <div class="field">
        <label>Ouvertures</label>
        <input id="s-ouv" type="number" placeholder="2" inputmode="numeric" oninput="calcSurfaces()">
      </div>
    </div>
    <div class="surf-info" id="surf-info">Renseigne sol + hauteur pour voir le calcul</div>
  </div>

  <!-- Prestations -->
  <div class="card">
    <div class="card-title">Prestations</div>
    <div id="prest-list"></div>
    <button class="btn-add-prest" onclick="addPrest()">+ Ajouter une prestation</button>
  </div>

  <div class="gap12">
    <button class="btn-gold" onclick="genererDevis()">Générer le devis →</button>
    <button class="btn-outline" onclick="resetForm()">Réinitialiser</button>
  </div>
  <div class="section-spacer"></div>
</div>

<!-- ② CLIENTS -->
<div class="screen" id="screen-clients">
  <div class="page-title">Clients</div>
  <div class="page-sub">Tes fiches clients sauvegardées</div>
  <div id="clients-list"></div>
  <div class="section-spacer"></div>
</div>

<!-- ③ HISTORIQUE -->
<div class="screen" id="screen-history">
  <div class="page-title">Historique</div>
  <div class="page-sub">Tous tes devis générés</div>
  <div id="history-list"></div>
  <div class="section-spacer"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="goScreen('devis')" id="nav-devis">
    <span class="icon">📋</span>
    <span>Devis</span>
  </button>
  <button class="nav-btn" onclick="goScreen('clients')" id="nav-clients">
    <span class="icon">👤</span>
    <span>Clients</span>
  </button>
  <button class="nav-btn" onclick="goScreen('history')" id="nav-history">
    <span class="icon">🗂️</span>
    <span>Historique</span>
  </button>
</nav>

<!-- MODAL DEVIS GÉNÉRÉ -->
<div class="modal-overlay" id="modal-devis">
  <div class="modal">
    <div class="modal-title">✅ Devis prêt</div>
    <div id="modal-summary" style="background:var(--dark3);border-radius:10px;padding:14px;margin-bottom:18px;font-size:13px;line-height:1.9;color:var(--text)"></div>
    <div class="gap12">
      <button class="btn-gold" onclick="ouvrirDevisPDF()">📄 Voir / Enregistrer PDF</button>
      <button class="btn-wa" onclick="envoyerWhatsApp()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.978-1.304A9.962 9.962 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a7.952 7.952 0 01-4.045-1.099l-.29-.173-2.956.775.787-2.878-.19-.295A7.958 7.958 0 014 12c0-4.418 3.582-8 8-8s8 3.582 8 8-3.582 8-8 8z"/></svg>
        Envoyer WhatsApp
      </button>
      <button class="btn-mail" onclick="envoyerEmail()">
        ✉️ Envoyer par Email
      </button>
      <button class="btn-outline" onclick="closeModal()">Fermer</button>
    </div>
  </div>
</div>

<!-- MODAL CLIENT -->
<div class="modal-overlay" id="modal-client">
  <div class="modal">
    <div class="modal-title">Charger un client</div>
    <div id="modal-clients-list"></div>
    <button class="btn-outline" style="margin-top:12px" onclick="document.getElementById('modal-client').classList.remove('open')">Annuler</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── TARIFS ───
const TARIFS = {
  peinture_blanc:    { label: "Peinture blanc 2 couches (fournie)", u: "m²", prix: 20 },
  peinture_couleur:  { label: "Peinture couleur 2 couches (fournie)", u: "m²", prix: 25 },
  ratissage:         { label: "Ratissage", u: "m²", prix: 20 },
  sous_couche:       { label: "Sous-couche", u: "m²", prix: 10 },
  poncage:           { label: "Ponçage bonde", u: "ml", prix: 5 },
  vinyle:            { label: "Pose vinyle / stratifié", u: "m²", prix: 15 },
  parquet_cc:        { label: "Pose parquet contrecollé", u: "m²", prix: 23 },
  terrasse:          { label: "Pose terrasse extérieure (MO)", u: "m²", prix: 35 },
  laine_mur:         { label: "Pose laine de roche/verre (mur)", u: "m²", prix: 11.5 },
  ossature_cloison:  { label: "Ossature métallique (cloison)", u: "m²", prix: 15 },
  placo_cloison:     { label: "Plaques plâtre sur cloison", u: "m²", prix: 14 },
  cloison_complete:  { label: "Cloison placo complète", u: "m²", prix: 27.5 },
  cloison_isolee:    { label: "Cloison placo avec isolation", u: "m²", prix: 40 },
  ossature_plafond:  { label: "Ossature métallique plafond", u: "m²", prix: 18.5 },
  isolation_plafond: { label: "Isolation plafond (laine)", u: "m²", prix: 11.5 },
  placo_plafond:     { label: "Pose placo plafond", u: "m²", prix: 22.5 },
  plafond_complet:   { label: "Plafond complet (structure+isolation+placo)", u: "m²", prix: 52 },
};

// ─── STATE ───
let surfMurs = 0, surfPlafond = 0, surfSol = 0, linMurs = 0;
let prestCount = 0;
let lastDevis = null;

// ─── INIT ───
document.getElementById('d-date').value = new Date().toISOString().split('T')[0];
addPrest();
renderClients();
renderHistory();

// ─── NAVIGATION ───
function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'clients') renderClients();
  if (name === 'history') renderHistory();
}

// ─── SURFACES ───
function calcSurfaces() {
  const sol = parseFloat(document.getElementById('s-sol').value) || 0;
  const h = parseFloat(document.getElementById('s-haut').value) || 0;
  const ouv = parseInt(document.getElementById('s-ouv').value) || 0;
  const info = document.getElementById('surf-info');
  if (sol > 0 && h > 0) {
    const perim = Math.sqrt(sol) * 4;
    surfMurs = Math.max(0, perim * h - ouv * 2);
    surfPlafond = sol; surfSol = sol; linMurs = perim;
    info.innerHTML = `Périmètre : <strong>${perim.toFixed(1)} ml</strong> &nbsp;|&nbsp; Murs : <strong>${surfMurs.toFixed(1)} m²</strong> &nbsp;|&nbsp; Plafond : <strong>${surfPlafond.toFixed(1)} m²</strong>`;
  } else {
    info.textContent = 'Renseigne sol + hauteur pour voir le calcul';
    surfMurs = surfPlafond = surfSol = linMurs = 0;
  }
}

// ─── PRESTATIONS ───
function addPrest() {
  prestCount++;
  const id = prestCount;
  const opts = Object.entries(TARIFS).map(([k,v]) =>
    `<option value="${k}">${v.label} — ${v.prix}€/${v.u}</option>`).join('');
  const div = document.createElement('div');
  div.className = 'prest-item';
  div.id = 'pi-' + id;
  div.innerHTML = `
    <div class="prest-row1">
      <select id="pt-${id}" onchange="updatePrestPrix(${id})">${opts}</select>
    </div>
    <div class="prest-row2">
      <div style="position:relative">
        <input type="number" id="pq-${id}" placeholder="Quantité" inputmode="decimal" min="0" step="0.1">
      </div>
      <div style="position:relative">
        <input type="number" id="pp-${id}" placeholder="Prix/u" inputmode="decimal" min="0" step="0.5">
      </div>
      <button class="btn-rm" onclick="document.getElementById('pi-${id}').remove()">×</button>
    </div>`;
  document.getElementById('prest-list').appendChild(div);
  updatePrestPrix(id);
}

function updatePrestPrix(id) {
  const t = TARIFS[document.getElementById('pt-' + id).value];
  document.getElementById('pp-' + id).value = t.prix;
}

function resetForm() {
  ['c-nom','c-tel','c-email','c-adr','d-ref','d-notes'].forEach(id => document.getElementById(id).value = '');
  ['s-sol','s-haut','s-ouv'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('d-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('prest-list').innerHTML = '';
  document.getElementById('surf-info').textContent = 'Renseigne sol + hauteur pour voir le calcul';
  surfMurs = surfPlafond = surfSol = linMurs = 0;
  prestCount = 0;
  addPrest();
  toast('Formulaire réinitialisé');
}

// ─── GÉNÉRER DEVIS ───
function getLignes() {
  const lignes = [];
  document.querySelectorAll('.prest-item').forEach(item => {
    const m = item.id.match(/pi-(\d+)/);
    if (!m) return;
    const id = m[1];
    const type = document.getElementById('pt-' + id).value;
    const qte = parseFloat(document.getElementById('pq-' + id).value) || 0;
    const prix = parseFloat(document.getElementById('pp-' + id).value) || TARIFS[type].prix;
    if (qte <= 0) return;
    lignes.push({ label: TARIFS[type].label, u: TARIFS[type].u, qte, prix, total: qte * prix });
  });
  return lignes;
}

function genererDevis() {
  const nom = document.getElementById('c-nom').value.trim();
  if (!nom) { toast('⚠️ Renseigne le nom du client'); return; }
  const lignes = getLignes();
  if (!lignes.length) { toast('⚠️ Ajoute au moins une prestation'); return; }

  const ref = document.getElementById('d-ref').value || 'GRH-' + Date.now().toString().slice(-6);
  document.getElementById('d-ref').value = ref;

  const total = lignes.reduce((s, l) => s + l.total, 0);
  const dateStr = document.getElementById('d-date').value;
  const dateF = dateStr ? new Date(dateStr + 'T12:00:00').toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'}) : '';

  lastDevis = {
    ref, date: dateStr, dateF,
    client: nom,
    tel: document.getElementById('c-tel').value,
    email: document.getElementById('c-email').value,
    adresse: document.getElementById('c-adr').value,
    notes: document.getElementById('d-notes').value,
    lignes, total,
    surfaces: surfMurs > 0 ? { sol: surfSol, murs: surfMurs, plafond: surfPlafond, lin: linMurs } : null
  };

  // Save to history
  const hist = JSON.parse(localStorage.getItem('grh_history') || '[]');
  hist.unshift({ ...lastDevis, savedAt: Date.now() });
  localStorage.setItem('grh_history', JSON.stringify(hist.slice(0, 50)));

  // Show modal summary
  document.getElementById('modal-summary').innerHTML =
    `<strong>${nom}</strong><br>
     Réf : ${ref} &nbsp;|&nbsp; ${dateF}<br>
     ${lastDevis.adresse ? lastDevis.adresse + '<br>' : ''}
     <strong style="color:var(--gold);font-size:16px">Total net : ${total.toFixed(2)} €</strong><br>
     <span style="color:var(--muted);font-size:12px">${lignes.length} prestation(s) — TVA non applicable</span>`;

  document.getElementById('modal-devis').classList.add('open');
}

function ouvrirDevisPDF() {
  if (!lastDevis) return;
  const blob = new Blob([buildDevisHTML(lastDevis)], { type: 'text/html' });
  window.open(URL.createObjectURL(blob), '_blank');
}

// ─── WHATSAPP ───
function envoyerWhatsApp() {
  if (!lastDevis) return;
  const tel = lastDevis.tel ? lastDevis.tel.replace(/\D/g,'') : '';
  const msg = `Bonjour ${lastDevis.client},\n\nVeuillez trouver ci-joint votre devis *${lastDevis.ref}* établi le ${lastDevis.dateF}.\n\n📋 Détail :\n${lastDevis.lignes.map(l => `• ${l.label} : ${l.qte.toFixed(1)} ${l.u} × ${l.prix}€ = *${l.total.toFixed(2)}€*`).join('\n')}\n\n💰 *Total net : ${lastDevis.total.toFixed(2)} €* (TVA non applicable)\n\nCordialement,\nGlobal Renov Habitat\n+33 6 52 84 24 31`;
  const url = tel
    ? `https://wa.me/${tel.startsWith('33') ? tel : '33' + tel.replace(/^0/,'')}?text=${encodeURIComponent(msg)}`
    : `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

// ─── EMAIL ───
function envoyerEmail() {
  if (!lastDevis) return;
  const lignesText = lastDevis.lignes.map(l => `${l.label} : ${l.qte.toFixed(1)} ${l.u} x ${l.prix}€ = ${l.total.toFixed(2)}€`).join('\n');
  const subject = `Devis ${lastDevis.ref} — Global Renov Habitat`;
  const body = `Bonjour ${lastDevis.client},\n\nVeuillez trouver ci-dessous votre devis ${lastDevis.ref} établi le ${lastDevis.dateF}.\n\nDétail des prestations :\n${lignesText}\n\nTOTAL NET : ${lastDevis.total.toFixed(2)} € (TVA non applicable — auto-entrepreneur)\n\nCordialement,\nGlobal Renov Habitat\n+33 6 52 84 24 31\nglobalrenov.habitat@gmail.com`;
  const email = lastDevis.email || '';
  window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function closeModal() {
  document.getElementById('modal-devis').classList.remove('open');
}

// ─── CLIENTS ───
function saveClient() {
  const nom = document.getElementById('c-nom').value.trim();
  if (!nom) { toast('⚠️ Renseigne le nom'); return; }
  const clients = JSON.parse(localStorage.getItem('grh_clients') || '[]');
  const existing = clients.findIndex(c => c.nom === nom);
  const client = {
    nom,
    tel: document.getElementById('c-tel').value,
    email: document.getElementById('c-email').value,
    adresse: document.getElementById('c-adr').value,
    savedAt: Date.now()
  };
  if (existing >= 0) clients[existing] = client;
  else clients.unshift(client);
  localStorage.setItem('grh_clients', JSON.stringify(clients));
  toast('✅ Client sauvegardé');
}

function renderClients() {
  const clients = JSON.parse(localStorage.getItem('grh_clients') || '[]');
  const el = document.getElementById('clients-list');
  if (!clients.length) {
    el.innerHTML = `<div class="empty"><div class="ei">👤</div><div class="et">Aucun client sauvegardé</div></div>`;
    return;
  }
  el.innerHTML = clients.map((c, i) => `
    <div class="client-card">
      <div>
        <div class="client-name">${c.nom}</div>
        <div class="client-meta">${[c.tel, c.email].filter(Boolean).join(' · ')}</div>
        <div class="client-meta">${c.adresse || ''}</div>
      </div>
      <div class="client-actions">
        <button class="btn-sm btn-sm-gold" onclick="chargerClient(${i})">Charger</button>
        <button class="btn-sm btn-sm-red" onclick="supprimerClient(${i})">×</button>
      </div>
    </div>`).join('');
}

function chargerClient(i) {
  const clients = JSON.parse(localStorage.getItem('grh_clients') || '[]');
  const c = clients[i];
  document.getElementById('c-nom').value = c.nom || '';
  document.getElementById('c-tel').value = c.tel || '';
  document.getElementById('c-email').value = c.email || '';
  document.getElementById('c-adr').value = c.adresse || '';
  goScreen('devis');
  toast('✅ Client chargé');
}

function supprimerClient(i) {
  const clients = JSON.parse(localStorage.getItem('grh_clients') || '[]');
  clients.splice(i, 1);
  localStorage.setItem('grh_clients', JSON.stringify(clients));
  renderClients();
  toast('Client supprimé');
}

// ─── HISTORIQUE ───
function renderHistory() {
  const hist = JSON.parse(localStorage.getItem('grh_history') || '[]');
  const el = document.getElementById('history-list');
  if (!hist.length) {
    el.innerHTML = `<div class="empty"><div class="ei">🗂️</div><div class="et">Aucun devis généré</div></div>`;
    return;
  }
  el.innerHTML = hist.map((d, i) => `
    <div class="hist-card">
      <div class="hist-top">
        <div class="hist-ref">${d.ref}</div>
        <div class="hist-total">${d.total.toFixed(2)} €</div>
      </div>
      <div class="hist-client">${d.client}</div>
      <div class="hist-date">${d.dateF} ${d.adresse ? '· ' + d.adresse : ''}</div>
      <div class="hist-actions">
        <button class="btn-sm btn-sm-gold" onclick="revoirDevis(${i})">📄 Voir PDF</button>
        <button class="btn-sm" style="background:rgba(37,211,102,.15);color:#25D366;border:1px solid rgba(37,211,102,.3)" onclick="waDevis(${i})">WhatsApp</button>
        <button class="btn-sm" style="background:rgba(52,120,246,.15);color:#3478F6;border:1px solid rgba(52,120,246,.3)" onclick="mailDevis(${i})">Email</button>
        <button class="btn-sm btn-sm-red" onclick="supprimerDevis(${i})">×</button>
      </div>
    </div>`).join('');
}

function revoirDevis(i) {
  const hist = JSON.parse(localStorage.getItem('grh_history') || '[]');
  const blob = new Blob([buildDevisHTML(hist[i])], { type: 'text/html' });
  window.open(URL.createObjectURL(blob), '_blank');
}

function waDevis(i) {
  const hist = JSON.parse(localStorage.getItem('grh_history') || '[]');
  lastDevis = hist[i];
  envoyerWhatsApp();
}

function mailDevis(i) {
  const hist = JSON.parse(localStorage.getItem('grh_history') || '[]');
  lastDevis = hist[i];
  envoyerEmail();
}

function supprimerDevis(i) {
  const hist = JSON.parse(localStorage.getItem('grh_history') || '[]');
  hist.splice(i, 1);
  localStorage.setItem('grh_history', JSON.stringify(hist));
  renderHistory();
  toast('Devis supprimé');
}

// ─── TOAST ───
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── SERVICE WORKER ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Close modal on overlay click
document.getElementById('modal-devis').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
